name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --allow-downgrades --allow-remove-essential --allow-change-held-packages \
        git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
        libssl-dev libgdbm-dev libsqlite3-dev libb2-dev libffi-dev libmpdec-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
      env:
        ACCEPT_SDK_LICENSE_NET_DOWNLOAD: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: guess-word-game-apk
        path: bin/*.apk
