\name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ccache python3-dev python3-pip libffi-dev zlib1g-dev libssl-dev openjdk-17-jdk unzip python3-virtualenv

      - name: Install Buildozer
        run: |
          pip3 install --user buildozer

      - name: Build APK with Buildozer
        run: |
          # Передаем "yes" прямо в команду сборки, чтобы автоматически принять все лицензии Google при скачивании SDK
          yes | ~/.local/bin/buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guess-word-apk
          path: bin/*.apk
